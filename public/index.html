<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Video Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-glow bg-glow-left"></div>
  <div class="bg-glow bg-glow-right"></div>

  <main class="page">
    <section class="hero">
      <p class="eyebrow">Prompt to 3D Scene Video</p>
      <h1>AI Video Generator</h1>
      <p class="subtitle">Text likho, language aur voice select karo, aur generated scene pipeline ka full result dekho.</p>
    </section>

    <section class="panel">
      <form id="generateForm" class="form-grid">
        <label class="field field-full">
          <span>Story Prompt</span>
          <textarea id="text" name="text" rows="5" placeholder="Example: Ek magical jungle jisme glowing tree ho..." required></textarea>
        </label>

        <label class="field">
          <span>Language</span>
          <select id="language" name="language">
            <option value="english">English</option>
            <option value="hindi">Hindi</option>
          </select>
        </label>

        <label class="field">
          <span>Voice</span>
          <select id="voice" name="voice">
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </label>

        <label class="field field-full">
          <span>Duration (seconds)</span>
          <input id="duration" name="duration" type="number" min="3" max="120" value="10" />
        </label>

        <div class="actions field-full">
          <button id="submitBtn" type="submit">Generate Video</button>
          <p id="statusText" class="status">Ready</p>
        </div>
      </form>
    </section>

    <section id="resultSection" class="panel hidden">
      <div class="result-head">
        <h2>Generation Result</h2>
        <a id="finalVideoLink" class="final-link hidden" target="_blank" rel="noreferrer">Open Final Video</a>
      </div>
      <div id="scenesContainer" class="scene-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
